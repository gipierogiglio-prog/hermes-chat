<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Chat</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <!-- Login Screen -->
  <div id="login-screen" class="screen hidden">
    <div class="login-card">
      <div class="login-icon">🤖</div>
      <h1>Hermes Chat</h1>
      <p>Conecte-se com sua conta Google<br>para conversar com o Hermes</p>
      <a href="/auth/login" class="google-btn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Entrar com Google
      </a>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="screen hidden">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>🤖 Hermes</h2>
        <button id="new-group-btn" class="icon-btn" title="Novo Grupo">＋</button>
      </div>
      <div class="sidebar-user" id="current-user">
        <img id="user-avatar" src="" alt="" class="avatar">
        <span id="user-name">Carregando...</span>
        <button id="logout-btn" class="icon-btn" title="Sair">⏻</button>
      </div>
      <div id="group-list" class="group-list">
        <div class="loading">Carregando grupos...</div>
      </div>
      <div class="sidebar-footer">
        <button id="invite-info-btn" class="text-btn">🔗 Como convidar</button>
      </div>
    </aside>

    <!-- Chat Area -->
    <main id="chat-area">
      <!-- Empty state -->
      <div id="empty-state">
        <div class="empty-icon">💬</div>
        <h3>Selecione um grupo</h3>
        <p>Escolha um grupo na sidebar ou crie um novo</p>
      </div>

      <!-- Active chat -->
      <div id="active-chat" class="hidden">
        <!-- Chat Header -->
        <header id="chat-header">
          <div class="chat-header-info">
            <h3 id="chat-group-name">Grupo</h3>
            <p id="chat-group-context" class="chat-context"></p>
          </div>
          <div class="chat-header-actions">
            <button id="edit-context-btn" class="icon-btn" title="Editar contexto">✎</button>
            <button id="copy-invite-btn" class="icon-btn" title="Copiar link do grupo">🔗</button>
            <button id="view-vault-btn" class="icon-btn" title="Abrir vault">📂</button>
          </div>
        </header>

        <!-- Messages -->
        <div id="messages-container">
          <div id="typing-indicator" class="hidden">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-text">Hermes está pensando...</span>
          </div>
        </div>

        <!-- Input -->
        <div id="input-area">
          <textarea id="message-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
          <button id="send-btn" class="send-btn" disabled>➤</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal: New Group -->
  <div id="modal-overlay" class="hidden">
    <div id="new-group-modal" class="modal">
      <div class="modal-header">
        <h3>Novo Grupo</h3>
        <button class="modal-close icon-btn">✕</button>
      </div>
      <div class="modal-body">
        <label>Nome do grupo</label>
        <input type="text" id="group-name-input" placeholder="Ex: Melhorias Escolaweb" maxlength="100">
        <label>Contexto / Descrição</label>
        <textarea id="group-context-input" rows="4" placeholder="Descreva o propósito do grupo. Ex: 'Este grupo discute melhorias no módulo Biblioteca do sistema Escolaweb. Os membros são desenvolvedores que trabalham na refatoração.'" maxlength="2000"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modal-cancel">Cancelar</button>
        <button class="btn-primary" id="modal-create">Criar Grupo</button>
      </div>
    </div>
  </div>

  <!-- Modal: Edit Context -->
  <div id="edit-context-modal" class="modal hidden">
    <div class="modal-header">
      <h3>Editar Contexto</h3>
      <button class="modal-close icon-btn" id="edit-close">✕</button>
    </div>
    <div class="modal-body">
      <label>Descrição do grupo</label>
      <textarea id="edit-context-input" rows="6" maxlength="2000"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="edit-cancel">Cancelar</button>
      <button class="btn-primary" id="edit-save">Salvar</button>
    </div>
  </div>

  <!-- Toast / Notification -->
  <div id="toast" class="hidden"></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
